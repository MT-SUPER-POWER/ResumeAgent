apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-agent-backend
  namespace: resume-agent
  labels:
    app: resume-agent-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: resume-agent-backend
  template:
    metadata:
      labels:
        app: resume-agent-backend
    spec:
      serviceAccountName: resume-agent-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: resume-agent-backend:dev
          imagePullPolicy: IfNotPresent
          args:
            - serve
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: backend-config
              mountPath: /app/application.local.yaml
              subPath: application.local.yaml
              readOnly: true
            - name: backend-logs
              mountPath: /app/logs
            - name: backend-output
              mountPath: /app/output
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: backend-config
          secret:
            secretName: resume-agent-backend
            items:
              - key: application.local.yaml
                path: application.local.yaml
        - name: backend-logs
          emptyDir: {}
        - name: backend-output
          emptyDir: {}
