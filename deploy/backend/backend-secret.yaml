apiVersion: v1
kind: Secret
metadata:
  name: resume-agent-backend
  namespace: resume-agent
type: Opaque
stringData:
  application.local.yaml: |
    db:
      host: resume-agent-pg
      port: 5432
      username: resume_agent
      password: changeme-in-production
      db_name: resume_agent
      max_connections: 20

    crypto:
      master_key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

    logger:
      dir: logs
      level: info
      rotation: daily

    llm:
      default_provider: ""
      default_model: ""
      timeout_seconds: 60
      max_retries: 3

    output:
      base_dir: ./output
      keep_intermediate: true

    pipeline:
      parse_workers: 2
      evaluate_workers: 5

    auth:
      jwt_secret: "resume-agent-local-dev-jwt-secret"
      jwt_ttl_hours: 168
