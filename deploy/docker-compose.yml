name: resume-agent

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-agent-pg
    environment:
      POSTGRES_USER: ${RA_DB__USERNAME:-resume_agent}
      POSTGRES_DB: ${RA_DB__DB_NAME:-resume_agent}
      POSTGRES_PASSWORD: ${RA_DB__PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${RA_DB__USERNAME:-resume_agent} -d ${RA_DB__DB_NAME:-resume_agent}" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../repo/backend
      dockerfile: .docker/Dockerfile
    container_name: resume-agent-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - logs:/app/logs
      - output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  logs:
  output:
