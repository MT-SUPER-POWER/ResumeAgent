apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: resume-agent-pg
  namespace: resume-agent
spec:
  serviceName: resume-agent-pg
  replicas: 1
  selector:
    matchLabels:
      app: resume-agent-pg
  template:
    metadata:
      labels:
        app: resume-agent-pg
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: resume-agent-pg
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - resume_agent
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - resume_agent
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
