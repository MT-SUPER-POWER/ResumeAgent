apiVersion: v1
kind: Service
metadata:
  name: resume-agent-pg
  namespace: resume-agent
spec:
  type: LoadBalancer
  selector:
    app: resume-agent-pg
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
    - port: 30432
      targetPort: 5432
      protocol: TCP
      name: postgres-local
